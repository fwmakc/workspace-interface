<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Bar UI</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/command-bar.css">
    <link rel="stylesheet" href="css/nav-bar.css">
    <link rel="stylesheet" href="css/status-bar.css">
    <link rel="stylesheet" href="css/apps-menu.css">
    <link rel="stylesheet" href="css/modes.css">
    <link rel="stylesheet" href="css/emoji.css">
    <link rel="stylesheet" href="css/attach.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/dock.css">
</head>
<body>

    <div class="chat-container" id="chatContainer"></div>

    <div class="bottom-area">
        <div class="header-container">
            <div class="command-container">
                <div class="command-bar">
                    <div class="bar-modes" id="barModes"></div>
                    <textarea id="cmdInput" class="command-input" placeholder="" rows="1"></textarea>

                    <div class="bar-actions">
                        <div class="emoji-picker" id="emojiPicker"></div>
                        <div class="icon-btn" id="emojiBtn" title="Эмодзи" role="button" tabindex="0" aria-label="Эмодзи">
                            <svg viewBox="0 0 24 24">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                            </svg>
                        </div>
                        <div class="icon-btn" id="attachBtn" title="Прикрепить файл" role="button" tabindex="0" aria-label="Прикрепить файл">
                            <svg viewBox="0 0 24 24">
                                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6h-1.5v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6H16.5z"/>
                            </svg>
                        </div>
                        <input type="file" id="fileInput" hidden multiple>
                    </div>
                </div>
                <div class="file-list" id="fileList"></div>

                <div class="header-panel">
                    <div class="navbar">
                        <div class="navbar-icon" id="appsIcon" title="Приложения" role="button" tabindex="0" aria-label="Приложения">
                            <div class="app-icon">
                                <span></span><span></span><span></span>
                                <span></span><span></span><span></span>
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                    <div class="statusbar">
                        <div class="statusbar-icon active" id="speakerBtn" title="Звук" role="button" tabindex="0" aria-label="Звук">
                            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </div>
                        <div class="statusbar-icon" id="micBtn" title="Голосовой поиск" role="button" tabindex="0" aria-label="Голосовой поиск">
                            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </div>
                        <div class="statusbar-clock" id="clock"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dock-bar glass-panel" id="dockBar"></div>
    </div>

    <div class="apps-menu glass-panel" id="appsMenu"></div>

    <script src="config/greetings.js"></script>
    <script src="config/background.js"></script>
    <script src="config/apps.js?v=2"></script>
    <script src="config/modes.js"></script>
    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/background.js"></script>
    <script src="js/placeholder.js"></script>
    <script src="js/history.js"></script>
    <script src="js/emoji.js"></script>
    <script src="js/attach.js"></script>
    <script src="js/dock.js"></script>
    <script src="js/apps.js?v=2"></script>
    <script src="js/mic.js"></script>
    <script src="js/speaker.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/modes.js"></script>
    <script src="js/markdown.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/bootstrap.js"></script>
</body>
</html>
